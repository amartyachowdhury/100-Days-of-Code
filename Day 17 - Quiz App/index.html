<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<h1>Quiz App</h1>
<p class="intro">Answer True or False to each computer science question.</p>

<div id="quiz" class="panel">
  <p id="progress" class="progress">Question 1 of 10</p>
  <p id="score" class="score">Score: 0</p>
  <p id="question" class="question"></p>

  <div class="choices">
    <button type="button" onclick="submitAnswer('true')">True</button>
    <button type="button" onclick="submitAnswer('false')">False</button>
  </div>

  <p id="feedback" class="feedback" aria-live="polite"></p>
</div>

<div id="result" class="panel" hidden>
  <h2>Quiz Complete</h2>
  <p id="finalScore" class="final-score"></p>
  <button type="button" onclick="startQuiz()">Play Again</button>
</div>

<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
