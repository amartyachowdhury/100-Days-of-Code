<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hangman</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<pre id="logo" class="logo" aria-hidden="true"></pre>
<h1>Hangman</h1>
<p class="intro">Guess the word one letter at a time. You have 6 lives.</p>

<div class="layout">
  <div class="game-panel">
    <pre id="stage" class="stage"></pre>
    <p id="lives" class="lives"></p>
    <p id="word" class="word" aria-live="polite"></p>
    <p id="message" class="message" aria-live="polite"></p>
    <div id="keyboard" class="keyboard"></div>
    <button id="newGame" type="button" onclick="startGame()" hidden>New Game</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
