<!DOCTYPE html>

<body>
<h1>Hirst Painting</h1>
<p class="intro">

  <canvas id="canvas" width="520" height="520" aria-label="Spot painting canvas"></canvas>
  <button type="button" onclick="generatePainting()">Generate New Painting</button>
</div>

<script src="colors.js"></script>

</body>
