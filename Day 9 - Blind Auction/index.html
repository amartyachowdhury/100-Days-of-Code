<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blind Auction</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<pre id="logo" class="logo" aria-hidden="true"></pre>
<h1>Blind Auction</h1>
<p class="intro">Each bidder submits a secret bid. The highest bid wins when the auction ends.</p>

<div id="auction">
  <p id="bidCount" class="bid-count">Bidders recorded: 0</p>
  <form id="bidForm" onsubmit="return false;">
    <div>
      <label for="name">Your name</label>
      <input type="text" id="name" placeholder="Enter your name">
    </div>
    <div>
      <label for="bid">Your bid ($)</label>
      <input type="number" id="bid" min="0" placeholder="Enter your bid">
    </div>
    <p id="error" class="error" hidden></p>
    <button type="button" onclick="submitBid()">Submit Bid</button>
  </form>
  <div id="afterBid" hidden>
    <p class="confirmation">Bid recorded. Amounts stay hidden until the auction ends.</p>
    <button type="button" onclick="addAnotherBidder()">Add Another Bidder</button>
    <button type="button" class="secondary" onclick="endAuction()">End Auction</button>
  </div>
</div>

<div id="result" hidden>
  <p id="winner" class="winner"></p>
  <button type="button" onclick="resetAuction()">Start New Auction</button>
</div>

<script src="script.js"></script>
</body>
</html>
