<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habit Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<h1>Habit Tracker</h1>
<p class="intro">
  Log daily cycling distance to a Pixela graph. Add, update, or delete a pixel for any date.
</p>

<div class="panel">
  <form id="trackerForm" class="tracker-form">
    <div class="field">
      <label for="username">Pixela Username</label>
      <input type="text" id="username" placeholder="your-username">
    </div>
    <div class="field">
      <label for="token">Pixela Token</label>
      <input type="password" id="token" placeholder="your token">
    </div>
    <div class="field">
      <label for="graphId">Graph ID</label>
      <input type="text" id="graphId" placeholder="cycling-graph">
    </div>
    <div class="field">
      <label for="date">Date</label>
      <input type="date" id="date">
    </div>
    <div class="field">
      <label for="quantity">Distance (km)</label>
      <input type="number" id="quantity" step="0.1" min="0" placeholder="5.5">
    </div>
    <div class="actions">
      <button type="button" onclick="submitPixel('add')">Add Pixel</button>
      <button type="button" class="secondary" onclick="submitPixel('update')">Update Pixel</button>
      <button type="button" class="danger" onclick="submitPixel('delete')">Delete Pixel</button>
    </div>
  </form>

  <p id="status" class="status" aria-live="polite">Enter your Pixela details to log or preview your habit graph.</p>

  <section id="graphSection" class="graph-section" hidden>
    <h2>Graph Preview</h2>
    <img id="graphImage" alt="Pixela habit graph">
    <p>
      <a id="graphLink" href="#" target="_blank" rel="noopener noreferrer">Open graph on Pixela</a>
    </p>
  </section>
</div>

<script src="script.js"></script>
</body>
</html>
