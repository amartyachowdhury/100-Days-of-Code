<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<pre id="logo" class="logo" aria-hidden="true"></pre>
<h1>Calculator</h1>
<p class="intro">Use the keypad to calculate. Chain results or start a new calculation.</p>

<div class="calculator">
  <p id="history" class="history"></p>
  <p id="display" class="display" aria-live="polite">0</p>
  <p id="message" class="message" aria-live="polite"></p>

  <div class="keypad">
    <button type="button" onclick="inputDigit('7')">7</button>
    <button type="button" onclick="inputDigit('8')">8</button>
    <button type="button" onclick="inputDigit('9')">9</button>
    <button type="button" class="op" onclick="inputOperation('+')">+</button>

    <button type="button" onclick="inputDigit('4')">4</button>
    <button type="button" onclick="inputDigit('5')">5</button>
    <button type="button" onclick="inputDigit('6')">6</button>
    <button type="button" class="op" onclick="inputOperation('-')">-</button>

    <button type="button" onclick="inputDigit('1')">1</button>
    <button type="button" onclick="inputDigit('2')">2</button>
    <button type="button" onclick="inputDigit('3')">3</button>
    <button type="button" class="op" onclick="inputOperation('*')">×</button>

    <button type="button" onclick="inputDigit('.')">.</button>
    <button type="button" onclick="inputDigit('0')">0</button>
    <button type="button" class="equals" onclick="calculate()">=</button>
    <button type="button" class="op" onclick="inputOperation('/')">÷</button>
  </div>

  <div class="actions">
    <button type="button" class="secondary" onclick="newCalculation()">New Calculation</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
