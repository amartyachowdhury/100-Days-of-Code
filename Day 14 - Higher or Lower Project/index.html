<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Higher or Lower</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<pre id="logo" class="logo" aria-hidden="true"></pre>
<h1>Higher or Lower</h1>
<p class="intro">Guess which account has more followers. How high can you score?</p>

<div id="game" class="panel">
  <p id="score" class="score">Score: 0</p>

  <div class="matchup">
    <button type="button" class="account-card" id="accountA" onclick="submitGuess('a')">
      <span class="label">A</span>
      <span id="textA" class="account-text"></span>
    </button>

    <pre id="vs" class="vs" aria-hidden="true"></pre>

    <button type="button" class="account-card" id="accountB" onclick="submitGuess('b')">
      <span class="label">B</span>
      <span id="textB" class="account-text"></span>
    </button>
  </div>

  <p id="feedback" class="feedback" aria-live="polite"></p>
</div>

<div id="result" class="panel" hidden>
  <p id="resultMessage" class="result"></p>
  <p id="followerReveal" class="follower-reveal"></p>
  <button type="button" onclick="startGame()">Play Again</button>
</div>

<script src="game_data.js"></script>
<script src="script.js"></script>
</body>
</html>
