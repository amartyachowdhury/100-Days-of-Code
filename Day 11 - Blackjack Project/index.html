<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blackjack</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<pre id="logo" class="logo" aria-hidden="true"></pre>
<h1>Blackjack</h1>
<p class="intro">Get as close to 21 as you can without going over. Beat the dealer.</p>

<div class="game">
  <section class="hand">
    <h2>Your Hand</h2>
    <p id="userCards" class="cards"></p>
    <p id="userScore" class="score"></p>
  </section>

  <section class="hand">
    <h2>Dealer</h2>
    <p id="dealerCards" class="cards"></p>
    <p id="dealerScore" class="score"></p>
  </section>

  <p id="result" class="result" aria-live="polite"></p>

  <div id="controls" class="controls">
    <button type="button" onclick="hit()">Hit</button>
    <button type="button" onclick="stand()">Stand</button>
  </div>

  <button id="newGame" type="button" onclick="startGame()" hidden>New Game</button>
</div>

<script src="script.js"></script>
</body>
</html>
