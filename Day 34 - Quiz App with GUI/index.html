<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz App with GUI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<h1>Quiz App with GUI</h1>
<p class="intro">
  True or false trivia from the Open Trivia Database. The card flashes green or red after each answer.
</p>

<div id="loading" class="panel">
  <p>Loading questions...</p>
</div>

<div id="quiz" class="panel" hidden>
  <div class="quiz-header">
    <p id="progress" class="progress">Question 1 of 10</p>
    <p id="score" class="score">Score: 0</p>
  </div>

  <div id="questionCard" class="question-card">
    <p id="question" class="question"></p>
  </div>

  <div class="choices">
    <button type="button" class="icon-button" onclick="submitAnswer('True')" aria-label="True">
      <img src="images/true.png" alt="True">
    </button>
    <button type="button" class="icon-button" onclick="submitAnswer('False')" aria-label="False">
      <img src="images/false.png" alt="False">
    </button>
  </div>
</div>

<div id="result" class="panel" hidden>
  <h2>Quiz Complete</h2>
  <p id="finalScore" class="final-score"></p>
  <button type="button" onclick="startQuiz()">Play Again</button>
</div>

<div id="error" class="panel error-panel" hidden>
  <p id="errorMessage"></p>
  <button type="button" onclick="startQuiz()">Try Again</button>
</div>

<script src="script.js"></script>
</body>
</html>
