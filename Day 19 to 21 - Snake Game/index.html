<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<h1>Snake Game</h1>
<p class="intro">
  Use arrow keys or the on-screen controls. Eat the food, grow longer, and avoid the walls and your tail.
</p>

<div class="panel">
  <p id="score" class="score">Score: 0</p>
  <canvas id="canvas" width="600" height="600" aria-label="Snake game board"></canvas>

  <div id="gameOver" class="game-over" hidden>
    <p>Game Over</p>
    <button type="button" onclick="startGame()">Play Again</button>
  </div>

  <div class="controls" aria-label="Direction controls">
    <button type="button" onclick="queueDirection(0, -1)">↑</button>
    <div class="controls-row">
      <button type="button" onclick="queueDirection(-1, 0)">←</button>
      <button type="button" onclick="queueDirection(1, 0)">→</button>
    </div>
    <button type="button" onclick="queueDirection(0, 1)">↓</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
