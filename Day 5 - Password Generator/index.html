<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<h1>PyPassword Generator</h1>
<p class="intro">Choose how many letters, symbols, and numbers to include in your password.</p>
<form id="passwordForm">
  <div>
    <label for="letters">How many letters?</label>
    <input type="number" id="letters" min="0" value="8">
  </div>
  <div>
    <label for="symbols">How many symbols?</label>
    <input type="number" id="symbols" min="0" value="2">
  </div>
  <div>
    <label for="numbers">How many numbers?</label>
    <input type="number" id="numbers" min="0" value="2">
  </div>
  <button type="button" onclick="generatePassword()">Generate Password</button>
</form>
<p id="error" class="error" hidden></p>
<div id="output" hidden>
  <p class="label">Your password is:</p>
  <p id="password" class="password"></p>
  <div class="output-actions">
    <button type="button" id="copyBtn" onclick="copyPassword()">Copy Password</button>
    <button type="button" onclick="generatePassword()">Generate Again</button>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
