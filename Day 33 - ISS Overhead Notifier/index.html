<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ISS Overhead Notifier</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<h1>ISS Overhead Notifier</h1>
<p class="intro">
  Check whether the International Space Station is close to your location and whether it is dark enough to see it.
</p>

<div class="panel">
  <form id="locationForm" class="location-form">
    <div class="field">
      <label for="latitude">Latitude</label>
      <input type="number" id="latitude" step="any" value="51.507351">
    </div>
    <div class="field">
      <label for="longitude">Longitude</label>
      <input type="number" id="longitude" step="any" value="-0.127758">
    </div>
    <button type="submit">Check Now</button>
  </form>

  <p id="status" class="status" aria-live="polite">Press Check Now to fetch live ISS data.</p>

  <section id="results" class="results" hidden>
    <div class="result-card">
      <h2>ISS Position</h2>
      <p id="issPosition"></p>
    </div>
    <div class="result-card">
      <h2>Your Location</h2>
      <p id="userPosition"></p>
    </div>
    <div class="result-card">
      <h2>Conditions</h2>
      <ul id="conditions" class="conditions"></ul>
    </div>
    <div id="notification" class="notification" hidden>
      <p>Look up! The ISS is above you in the sky.</p>
    </div>
  </section>
</div>

<script src="script.js"></script>
</body>
</html>
